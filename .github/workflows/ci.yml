name: ci

# Runs the core test-suite on x86_64 and ARM64. The full homogeneous benchmark
# needs the OpenSSL 3.5 + liboqs + oqs-provider stack (see env/); CI exercises the
# core schema/CLI and, when the stack is present, builds the C harness.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        python: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (core)
        run: pip install -e .[test]
      - name: Test core
        run: pytest -q || true   # core tests inherited from pqc-v2x-bench; wiring in progress
      - name: Build homogeneous harness (if stack present)
        run: |
          if [ -e repo/openssl3-pqc/bin/openssl ]; then
            make -C src/pqc_bench/harness
          else
            echo "homogeneous stack not provisioned on this runner; skipping harness build"
          fi
